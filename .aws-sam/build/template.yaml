AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Serverless SIEM with DuckDB and Fargate
Parameters:
  SubnetIds:
    Type: CommaDelimitedList
    Description: Comma-separated subnet IDs for Fargate tasks (must have internet
      access)
  SecurityGroupId:
    Type: String
    Description: Security group ID for Fargate tasks
Globals:
  Function:
    Timeout: 300
    MemorySize: 4096
    Runtime: python3.13
    Architectures:
    - x86_64
Resources:
  SiemDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: siem-data-${AWS::AccountId}-${AWS::Region}
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      LifecycleConfiguration:
        Rules:
        - Id: TransitionToIA
          Status: Enabled
          Prefix: processed/
          Transitions:
          - TransitionInDays: 30
            StorageClass: STANDARD_IA
  SiemEcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: SiemIngestionCluster
  SiemIngestionTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
        - Effect: Allow
          Principal:
            Service: ecs-tasks.amazonaws.com
          Action: sts:AssumeRole
      Policies:
      - PolicyName: S3Access
        PolicyDocument:
          Statement:
          - Effect: Allow
            Action:
            - s3:GetObject
            - s3:PutObject
            - s3:ListBucket
            Resource:
            - Fn::Sub: arn:aws:s3:::siem-data-${AWS::AccountId}-${AWS::Region}
            - Fn::Sub: arn:aws:s3:::siem-data-${AWS::AccountId}-${AWS::Region}/*
  SiemIngestionTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
        - Effect: Allow
          Principal:
            Service: ecs-tasks.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
      - PolicyName: IngestionLogs
        PolicyDocument:
          Statement:
          - Effect: Allow
            Action:
            - logs:CreateLogStream
            - logs:PutLogEvents
            Resource:
              Fn::Sub: arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/siem-ingestion:*
  SiemIngestionTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      RequiresCompatibilities:
      - FARGATE
      NetworkMode: awsvpc
      Cpu: '4096'
      Memory: '16384'
      TaskRoleArn:
        Fn::GetAtt:
        - SiemIngestionTaskRole
        - Arn
      ExecutionRoleArn:
        Fn::GetAtt:
        - SiemIngestionTaskExecutionRole
        - Arn
      ContainerDefinitions:
      - Name: IngestionContainer
        Image: '093487859380.dkr.ecr.us-west-2.amazonaws.com/siemlessly/ingestion'
        Environment:
        - Name: S3_BUCKET
          Value:
            Fn::Sub: siem-data-${AWS::AccountId}-${AWS::Region}
        LogConfiguration:
          LogDriver: awslogs
          Options:
            awslogs-group: /ecs/siem-ingestion
            awslogs-region:
              Ref: AWS::Region
            awslogs-stream-prefix: ecs
  IngestionEventRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
        - Effect: Allow
          Principal:
            Service: events.amazonaws.com
          Action: sts:AssumeRole
      Policies:
      - PolicyName: RunFargateTask
        PolicyDocument:
          Statement:
          - Effect: Allow
            Action: ecs:RunTask
            Resource:
              Ref: SiemIngestionTaskDefinition
            Condition:
              ArnLike:
                ecs:cluster:
                  Fn::GetAtt:
                  - SiemEcsCluster
                  - Arn
          - Effect: Allow
            Action: iam:PassRole
            Resource:
            - Fn::GetAtt:
              - SiemIngestionTaskRole
              - Arn
            - Fn::GetAtt:
              - SiemIngestionTaskExecutionRole
              - Arn
  IngestionTriggerRule:
    Type: AWS::Events::Rule
    Properties:
      Name: SiemRawLogIngestion
      Description: Triggers Fargate ingestion when raw logs are uploaded to S3
      State: ENABLED
      EventPattern:
        source:
        - aws.s3
        detail-type:
        - Object Created
        detail:
          bucket:
            name:
            - Fn::Sub: siem-data-${AWS::AccountId}-${AWS::Region}
          object:
            key:
            - prefix: raw/
      Targets:
      - Id: FargateIngestionTask
        Arn:
          Fn::GetAtt:
          - SiemEcsCluster
          - Arn
        RoleArn:
          Fn::GetAtt:
          - IngestionEventRole
          - Arn
        EcsParameters:
          TaskDefinitionArn:
            Ref: SiemIngestionTaskDefinition
          LaunchType: FARGATE
          TaskCount: 1
          NetworkConfiguration:
            AwsVpcConfiguration:
              Subnets:
                Ref: SubnetIds
              SecurityGroups:
              - Ref: SecurityGroupId
              AssignPublicIp: ENABLED
        InputTransformer:
          InputPathsMap:
            bucket: $.detail.bucket.name
            key: $.detail.object.key
          InputTemplate: "{\n  \"containerOverrides\": [\n    {\n      \"name\": \"\
            IngestionContainer\",\n      \"environment\": [\n        {\n         \
            \ \"name\": \"TARGET_S3_URL\",\n          \"value\": \"s3://<bucket>/<key>\"\
            \n        }\n      ]\n    }\n  ]\n}\n"
  IngestionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/siem-ingestion
      RetentionInDays: 14
  AlertsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /siemlessly/alerts
      RetentionInDays: 30
  SiemAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName:
        Fn::Sub: siem-alerts-${AWS::AccountId}-${AWS::Region}
  QueryEngineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: S3Read
        PolicyDocument:
          Statement:
          - Effect: Allow
            Action:
            - s3:GetObject
            - s3:ListBucket
            Resource:
            - Fn::Sub: arn:aws:s3:::siem-data-${AWS::AccountId}-${AWS::Region}
            - Fn::Sub: arn:aws:s3:::siem-data-${AWS::AccountId}-${AWS::Region}/*
  DetectionEngineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: S3Read
        PolicyDocument:
          Statement:
          - Effect: Allow
            Action:
            - s3:GetObject
            - s3:ListBucket
            Resource:
            - Fn::Sub: arn:aws:s3:::siem-data-${AWS::AccountId}-${AWS::Region}
            - Fn::Sub: arn:aws:s3:::siem-data-${AWS::AccountId}-${AWS::Region}/*
      - PolicyName: SNSPublish
        PolicyDocument:
          Statement:
          - Effect: Allow
            Action: sns:Publish
            Resource:
              Ref: SiemAlertsTopic
      - PolicyName: CloudWatchLogs
        PolicyDocument:
          Statement:
          - Effect: Allow
            Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
            Resource:
              Fn::Sub: ${AlertsLogGroup.Arn}:*
  QueryEngineFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: QueryEngineFunction
      Handler: query_engine.lambda_handler
      Role:
        Fn::GetAtt:
        - QueryEngineRole
        - Arn
      Environment:
        Variables:
          S3_BUCKET:
            Fn::Sub: siem-data-${AWS::AccountId}-${AWS::Region}
    Metadata:
      SamResourceId: QueryEngineFunction
  DetectionEngineFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: DetectionEngineFunction
      Handler: detection_engine.lambda_handler
      Timeout: 600
      MemorySize: 6144
      Role:
        Fn::GetAtt:
        - DetectionEngineRole
        - Arn
      Environment:
        Variables:
          S3_BUCKET:
            Fn::Sub: siem-data-${AWS::AccountId}-${AWS::Region}
          ALERTS_LOG_GROUP:
            Ref: AlertsLogGroup
          RULES_CACHE_TTL: '300'
          SOURCES_CACHE_TTL: '600'
      Events:
        NewProcessedDataUpload:
          Type: S3
          Properties:
            Bucket:
              Ref: SiemDataBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                - Name: prefix
                  Value: processed/
                - Name: suffix
                  Value: .parquet
        ScheduledDetection:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
            Name: HourlySiemDetections
            Description: Runs scheduled DuckDB queries against recent parquet logs
    Metadata:
      SamResourceId: DetectionEngineFunction
Outputs:
  SiemDataBucketName:
    Value:
      Ref: SiemDataBucket
    Description: S3 bucket for raw logs and processed parquet files
  SiemAlertsTopicArn:
    Value:
      Ref: SiemAlertsTopic
    Description: SNS topic ARN for SIEM alerts
